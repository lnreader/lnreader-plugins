name: Build Plugins

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Check available scripts
        run: npm run

      - name: Build plugins
        run: npx ts-node scripts/build.ts || npx vite build || npx tsc || npm run generate || npm run compile || echo "No build script found"

      - name: Deploy to plugins branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: plugins
          publish_dir: ./.dist
          destination_dir: v3.0.0/.dist
